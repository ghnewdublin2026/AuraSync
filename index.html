<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraSync | Bio-Acoustic Engine</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --pulse: #ef4444;
            --text: #f1f5f9;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            box-sizing: border-box;
        }

        header { margin: 2rem 0; text-align: center; }
        h1 { font-weight: 300; letter-spacing: 2px; margin: 0; }
        .status { font-size: 0.8rem; color: var(--accent); opacity: 0.8; }

        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .control-group { margin-bottom: 20px; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; }
        
        input[type=range] {
            width: 100%;
            height: 6px;
            border-radius: 5px;
            appearance: none;
            background: #334155;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .primary-btn { background: var(--accent); color: var(--bg); }
        .sync-btn { 
            background: transparent; 
            border: 2px solid var(--pulse); 
            color: var(--pulse); 
            margin-top: 10px;
        }

        .sync-btn.active {
            background: var(--pulse);
            color: white;
            animation: glow 1.5s infinite;
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px var(--pulse); }
            50% { box-shadow: 0 0 20px var(--pulse); }
            100% { box-shadow: 0 0 5px var(--pulse); }
        }

        #video-container {
            width: 50px; height: 50px; 
            border-radius: 50%; overflow: hidden;
            margin: 10px auto; border: 2px solid #334155;
            display: none;
        }

        video { object-fit: cover; width: 100%; height: 100%; filter: grayscale(100%) contrast(200%); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AuraSync</h1>
        <div class="status" id="engine-status">Engine: Standby</div>
    </header>

    <div class="card">
        <button class="primary-btn" id="master-switch">INITIALIZE ENGINE</button>
    </div>

    <div class="card">
        <div class="control-group">
            <div class="label-row">
                <span>Spatial 3D Orbit</span>
                <span id="spatial-val">0.27 Hz</span>
            </div>
            <input type="range" id="spatial-slider" min="0.01" max="1.5" step="0.01" value="0.27">
        </div>
        <p style="font-size: 0.75rem; color: #94a3b8; margin: 0;">Moves noise source 360° using HRTF modeling.</p>
    </div>

    <div class="card">
        <div class="control-group">
            <div class="label-row">
                <span>Breathing Depth</span>
                <span id="breath-depth-val">47%</span>
            </div>
            <input type="range" id="breath-depth-slider" min="0" max="1" step="0.01" value="0.47">
        </div>

        <div class="control-group">
            <div class="label-row">
                <span>Breathing Speed</span>
                <span id="breath-speed-val">0.23 Hz</span>
            </div>
            <input type="range" id="breath-speed-slider" min="0.05" max="0.8" step="0.01" value="0.23">
        </div>

        <div id="video-container"><video id="monitor" playsinline></video></div>
        <button class="sync-btn" id="sync-trigger">ACTIVATE BIO-SYNC</button>
    </div>
</div>

<script>
/** * AURA SYNC ENGINE 
 * Core logic for Audio Synthesis, 3D Panning, and PPG Heart Rate Detection
 */

let audioCtx, noiseSource, breathingNode, pannerNode;
let isRunning = false;
let isSyncing = false;

// Audio Graph Initialization
const initAudio = () => {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Create White Noise
    const bufferSize = 2 * audioCtx.sampleRate;
    const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const output = noiseBuffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
        output[i] = Math.random() * 2 - 1;
    }

    noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    noiseSource.loop = true;

    // Gain node for "Breathing" effect
    breathingNode = audioCtx.createGain();
    
    // Panner for Spatial 3D
    pannerNode = audioCtx.createPanner();
    pannerNode.panningModel = 'HRTF';
    pannerNode.distanceModel = 'inverse';

    // Route: Source -> Breathing -> Panner -> Out
    noiseSource.connect(breathingNode);
    breathingNode.connect(pannerNode);
    pannerNode.connect(audioCtx.destination);

    noiseSource.start();
    updateAudioLoop();
};

// Continuous Parameter Modulation
const updateAudioLoop = () => {
    const now = audioCtx.currentTime;

    // 1. Spatial Orbit Logic
    const spatialSpeed = parseFloat(document.getElementById('spatial-slider').value);
    const x = Math.sin(now * spatialSpeed * 2 * Math.PI) * 5;
    const z = Math.cos(now * spatialSpeed * 2 * Math.PI) * 5;
    pannerNode.positionX.value = x;
    pannerNode.positionZ.value = z;

    // 2. Breathing Logic
    const breathSpeed = parseFloat(document.getElementById('breath-speed-slider').value);
    const breathDepth = parseFloat(document.getElementById('breath-depth-slider').value);
    const baseVol = 1 - (breathDepth / 2);
    const mod = (Math.sin(now * breathSpeed * 2 * Math.PI) * (breathDepth / 2));
    breathingNode.gain.value = baseVol + mod;

    requestAnimationFrame(updateAudioLoop);
};

// PPG Bio-Sync Logic
const bioSync = {
    canvas: document.createElement('canvas'),
    ctx: null,
    history: [],
    
    process(video) {
        if (!this.ctx) this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
        this.ctx.drawImage(video, 0, 0, 10, 10);
        const data = this.ctx.getImageData(0, 0, 10, 10).data;
        
        let rSum = 0;
        for (let i = 0; i < data.length; i += 4) rSum += data[i];
        const avg = rSum / (data.length / 4);

        this.history.push({ v: avg, t: performance.now() });
        if (this.history.length > 100) this.history.shift();
        
        this.analyze();
    },

    analyze() {
        if (this.history.length < 50) return;
        let peaks = 0;
        for (let i = 1; i < this.history.length - 1; i++) {
            if (this.history[i].v > this.history[i-1].v && this.history[i].v > this.history[i+1].v) peaks++;
        }
        const timeSpan = (this.history[this.history.length-1].t - this.history[0].t) / 1000;
        const bpm = (peaks / timeSpan) * 60;

        if (bpm > 45 && bpm < 110) {
            const targetHz = (bpm / 60) / 2.5; // Calm ratio
            document.getElementById('breath-speed-slider').value = targetHz;
            document.getElementById('breath-speed-val').innerText = `${targetHz.toFixed(2)} Hz (Synced)`;
        }
    }
};

// UI Interaction Listeners
document.getElementById('master-switch').addEventListener('click', function() {
    if (!isRunning) {
        initAudio();
        this.innerText = "STOP ENGINE";
        document.getElementById('engine-status').innerText = "Engine: Active (HRTF)";
        isRunning = true;
    } else {
        audioCtx.close();
        location.reload(); 
    }
});

document.getElementById('sync-trigger').addEventListener('click', async function() {
    const video = document.getElementById('monitor');
    const container = document.getElementById('video-container');

    if (!isSyncing) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            video.srcObject = stream;
            video.play();
            container.style.display = 'block';
            this.classList.add('active');
            this.innerText = "SYNCING PULSE...";
            isSyncing = true;
            setInterval(() => bioSync.process(video), 1000/30);
        } catch (e) {
            alert("Camera needed for Bio-Sync.");
        }
    }
});

// Slider UI Updates
document.getElementById('spatial-slider').addEventListener('input', (e) => {
    document.getElementById('spatial-val').innerText = `${e.target.value} Hz`;
});
document.getElementById('breath-depth-slider').addEventListener('input', (e) => {
    document.getElementById('breath-depth-val').innerText = `${Math.round(e.target.value * 100)}%`;
});
document.getElementById('breath-speed-slider').addEventListener('input', (e) => {
    document.getElementById('breath-speed-val').innerText = `${e.target.value} Hz`;
});

</script>
</body>
</html>
