<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraSync | Full Suite</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8;
            --pulse: #ef4444; --text: #f1f5f9; --slider: #475569;
            --save: #10b981;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding-bottom: 80px;
        }

        .container { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; }
        header { margin: 1.5rem 0; text-align: center; }
        h1 { font-weight: 300; letter-spacing: 3px; margin: 0; color: var(--accent); }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin: 20px 0 10px 0; }
        
        .card {
            background: var(--card); border-radius: 24px;
            padding: 22px; margin-bottom: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .control-group { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.85rem; font-weight: 500; }
        
        input[type=range] {
            width: 100%; height: 6px; border-radius: 5px;
            appearance: none; background: var(--slider); outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none; width: 22px; height: 22px;
            border-radius: 50%; background: var(--accent); cursor: pointer;
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.4);
        }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem;
        }

        .primary-btn { background: var(--accent); color: var(--bg); grid-column: span 2; }
        .save-btn { background: var(--save); color: white; }
        .load-btn { background: var(--slider); color: white; }
        .sync-btn { background: transparent; border: 2px solid var(--pulse); color: var(--pulse); }
        
        #video-container { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; margin: 10px auto; display: none; border: 2px solid var(--pulse); }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>AuraSync</h1>
        <div id="engine-status" style="font-size: 0.7rem; opacity: 0.5;">ENGINE STANDBY</div>
    </header>

    <div class="card">
        <button class="primary-btn" id="master-switch">START ENGINE</button>
        <div class="btn-grid">
            <button class="save-btn" id="save-preset">SAVE PRESET</button>
            <button class="load-btn" id="load-preset">LOAD LAST</button>
        </div>
    </div>

    <h2>Master Dynamics (Compressor)</h2>
    <div class="card">
        <div class="comp-grid">
            <div class="control-group">
                <div class="label-row"><span>Threshold</span><span id="v-thresh">-24</span></div>
                <input type="range" class="persist" id="c-thresh" min="-100" max="0" value="-24">
            </div>
            <div class="control-group">
                <div class="label-row"><span>Ratio</span><span id="v-ratio">12</span></div>
                <input type="range" class="persist" id="c-ratio" min="1" max="20" value="12">
            </div>
            <div class="control-group">
                <div class="label-row"><span>Attack</span><span id="v-attack">0.003</span></div>
                <input type="range" class="persist" id="c-attack" min="0" max="0.5" step="0.001" value="0.003">
            </div>
            <div class="control-group">
                <div class="label-row"><span>Release</span><span id="v-release">0.25</span></div>
                <input type="range" class="persist" id="c-release" min="0" max="1" step="0.01" value="0.25">
            </div>
        </div>
        <div class="control-group" style="margin-top: 10px;">
            <div class="label-row"><span>Knee (Sustain)</span><span id="v-knee">30</span></div>
            <input type="range" class="persist" id="c-knee" min="0" max="40" value="30">
        </div>
    </div>

    <h2>Spatial & Breathing</h2>
    <div class="card">
        <div class="control-group">
            <div class="label-row"><span>3D Orbit Speed</span><span id="v-spatial">0.27 Hz</span></div>
            <input type="range" class="persist" id="spatial-slider" min="0" max="2" step="0.01" value="0.27">
        </div>
        <div class="control-group">
            <div class="label-row"><span>Breath Depth</span><span id="v-breath-d">47%</span></div>
            <input type="range" class="persist" id="breath-depth" min="0" max="1" step="0.01" value="0.47">
        </div>
        <button class="sync-btn" id="sync-trigger">ACTIVATE BIO-SYNC</button>
        <div id="video-container"><video id="monitor" playsinline></video></div>
    </div>
</div>

<script>
/** * AURASYNC CORE ENGINE v1.2
 */
let audioCtx, noiseSource, breathNode, panner, compNode;
let isLive = false;

const startAudio = () => {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Noise Generation
    const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;

    noiseSource = audioCtx.createBufferSource();
    noiseSource.buffer = buffer;
    noiseSource.loop = true;

    // Nodes
    breathNode = audioCtx.createGain();
    panner = audioCtx.createPanner();
    panner.panningModel = 'HRTF';
    compNode = audioCtx.createDynamicsCompressor();

    // Routing
    noiseSource.connect(breathNode);
    breathNode.connect(panner);
    panner.connect(compNode);
    compNode.connect(audioCtx.destination);

    noiseSource.start();
    requestAnimationFrame(renderLoop);
};

const renderLoop = () => {
    const t = audioCtx.currentTime;
    
    // Apply Compressor (Live from UI)
    compNode.threshold.setTargetAtTime(document.getElementById('c-thresh').value, t, 0.03);
    compNode.ratio.setTargetAtTime(document.getElementById('c-ratio').value, t, 0.03);
    compNode.attack.setTargetAtTime(document.getElementById('c-attack').value, t, 0.03);
    compNode.release.setTargetAtTime(document.getElementById('c-release').value, t, 0.03);
    compNode.knee.setTargetAtTime(document.getElementById('c-knee').value, t, 0.03);

    // Spatial Orbit
    const speed = document.getElementById('spatial-slider').value;
    panner.positionX.setTargetAtTime(Math.sin(t * speed * Math.PI * 2) * 5, t, 0.03);
    panner.positionZ.setTargetAtTime(Math.cos(t * speed * Math.PI * 2) * 5, t, 0.03);

    // Breath Depth (Using the logic from the previous turn)
    const depth = document.getElementById('breath-depth').value;
    const lfo = 0.5 + (Math.sin(t * 0.23 * Math.PI * 2) * (depth / 2)); 
    breathNode.gain.setTargetAtTime(lfo, t, 0.03);

    requestAnimationFrame(renderLoop);
};

// PRESET PERSISTENCE ENGINE
const savePreset = () => {
    const settings = {};
    document.querySelectorAll('.persist').forEach(el => settings[el.id] = el.value);
    localStorage.setItem('auraSync_preset', JSON.stringify(settings));
    alert("Preset Cached Successfully!");
};

const loadPreset = () => {
    const data = localStorage.getItem('auraSync_preset');
    if (!data) return alert("No preset found.");
    const settings = JSON.parse(data);
    for (const [id, val] of Object.entries(settings)) {
        const el = document.getElementById(id);
        if (el) {
            el.value = val;
            el.dispatchEvent(new Event('input')); // Update labels
        }
    }
};

// UI BINDINGS
document.querySelectorAll('input[type=range]').forEach(input => {
    input.oninput = (e) => {
        const valDisplay = document.getElementById('v-' + e.target.id.replace('c-', ''));
        if (valDisplay) valDisplay.innerText = e.target.value;
    };
});

document.getElementById('master-switch').onclick = function() {
    if(!isLive) { startAudio(); isLive = true; this.innerText = "KILL ENGINE"; }
    else { audioCtx.close(); location.reload(); }
};

document.getElementById('save-preset').onclick = savePreset;
document.getElementById('load-preset').onclick = loadPreset;

</script>
</body>
</html>
